name: Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-debug-apk:
    name: Build Live Tafelbord APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Grant execute permission for Gradle
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew --no-daemon assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: live-tafelbord-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Publish direct APK download
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p direct-apk
          cp app/build/outputs/apk/debug/app-debug.apk direct-apk/live-tafelbord.apk
          cat > direct-apk/README.md <<'EOF'
          # Live Tafelbord APK

          Download de nieuwste APK hier:

          https://github.com/Giliamvanboekel/Tafelbord/raw/apk-download/live-tafelbord.apk
          EOF
          cd direct-apk
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b apk-download
          git add live-tafelbord.apk README.md
          git commit -m "Publish Live Tafelbord APK"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin apk-download
